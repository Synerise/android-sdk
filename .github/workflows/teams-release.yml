name: Notify Teams on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Teams
        env:
          WEBHOOK: ${{ secrets.TEAMS_RELEASES_WEBHOOK }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          BODY: ${{ github.event.release.body }}
        run: |
          # Truncate changelog so the Adaptive Card stays within Teams' ~28KB limit
          CHANGELOG=$(printf '%s' "$BODY" | head -c 3000)

          jq -n \
            --arg repo "$REPO" \
            --arg tag "$TAG" \
            --arg name "$RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg changelog "$CHANGELOG" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    { type: "TextBlock", size: "Large", weight: "Bolder",
                      text: "🚀 New SDK Release  #LATEST_RELEASE" },
                    { type: "TextBlock", spacing: "None", isSubtle: true,
                      text: ($repo + "  •  " + $tag) },
                    { type: "TextBlock", weight: "Bolder", text: $name, wrap: true },
                    { type: "TextBlock", text: $changelog, wrap: true }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View release", url: $url }
                  ]
                }
              }]
            }' > payload.json

          curl -sS -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @payload.json
